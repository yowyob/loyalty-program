spring:
  application:
    name: loyaulty-program

  # ── Base de données R2DBC (réactif) ────────────────────────
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:loyalty_db}
    username: ${DB_USER:loyalty_user}
    password: ${DB_PASSWORD:loyalty_pass}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  # ── Liquibase (migrations SQL via JDBC synchrone) ───────────
  liquibase:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:loyalty_db}
    user: ${DB_USER:loyalty_user}
    password: ${DB_PASSWORD:loyalty_pass}
    change-log: classpath:db/changelog/db.changelog-master.yaml

  # ── Redis (idempotence + cache solde) ───────────────────────
  # `url` prend le pas sur host/port/password quand elle est renseignée
  # (utile pour les Redis managés qui n'exposent qu'une connection string, ex. Render Key Value).
  data:
    redis:
      url: ${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ── Kafka ────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                       # Durabilité maximale
      retries: 3
      properties:
        enable.idempotence: true      # Producteur idempotent Kafka
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: loyalty-wallet-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.yowyob.loyalty.domain.wallet.event
    topics:
      wallet-credited: wallet.credited
      wallet-debited: wallet.debited
      wallet-frozen: wallet.frozen
      wallet-unfrozen: wallet.unfrozen
      wallet-closed: wallet.closed
      wallet-fraud-suspected: wallet.fraud_suspected
      payment-confirmed: payment.confirmed
      loyalty-events: loyalty.events
      loyalty-reward-grants: loyalty.rewards.grant-requests

# ── Serveur WebFlux ──────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: never            # Pas de stacktrace en réponse (sécurité)
    include-exception: false

# ── Actuator & Prometheus ────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ── SpringDoc / OpenAPI ──────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  show-actuator: false

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.yowyob.loyalty: DEBUG
    org.springframework.r2dbc: INFO
    liquibase: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{tenantId}] %logger{36} - %msg%n"

# ── Configuration Kernel Core ────────────────────────────────
app:
  kernel-core:
    base-url: ${KERNEL_CORE_URL:http://localhost:8090}
    service-client-id: ${KERNEL_SERVICE_CLIENT_ID:loyalty-service}
    service-client-secret: ${KERNEL_SERVICE_CLIENT_SECRET:changeme}
    token-endpoint: ${KERNEL_TOKEN_ENDPOINT:}
    # Tenant plateforme KernelCore (X-Tenant-Id) sous lequel /api/v1/auth/login se connecte.
    tenant-id: ${KERNEL_TENANT_ID:}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000

  bonification:
    enabled: ${BONIFICATION_ENABLED:true}
    base-url: ${BONIFICATION_API_BASE_URL:https://bonusapi.onrender.com}
    default-login: ${BONIFICATION_LOGIN:}
    default-password: ${BONIFICATION_PASSWORD:}
    token-ttl: ${BONIFICATION_TOKEN_TTL:PT50M}
    connect-timeout-ms: ${BONIFICATION_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${BONIFICATION_READ_TIMEOUT_MS:15000}

  # Secret statique pour la console plateforme (/api/v1/admin/platform/**), qui
  # n'est rattachée à aucun tenant — distinct des credentials tenant (JWT / clé API).
  platform-admin:
    secret: ${PLATFORM_ADMIN_KEY:}

  security:
    jwt:
      # C'est ici, sous app.security.jwt.*, que JwtProperties/JwtTokenValidator lisent
      # réellement la config JWT — pas sous spring.security.oauth2.resourceserver.jwt.* (qui
      # n'est consommé par aucun code de ce backend : ce dernier construit son propre
      # NimbusReactiveJwtDecoder à la main). Avec ces clés au mauvais endroit, jwk-set-uri restait
      # toujours vide et retombait sur "http://localhost/dummy" (voir JwtTokenValidator),
      # provoquant un rejet JWT systématique — vérifié en conditions réelles.
      issuer-uri: ${JWT_ISSUER_URI:kernel-core}
      jwk-set-uri: ${JWT_JWK_SET_URI:https://kernel-core.yowyob.com/.well-known/jwks.json}
      # Claims réels du JWT KernelCore auth-core (sub, tid, oid, aid, actor, permissions, adm).
      # tenant-id-claim n'est utilisé qu'en repli quand le client n'envoie pas X-Organization-Id
      # (voir TenantResolutionFilter) — un login tenant-scopé "nu" ne porte pas de claim "oid".
      tenant-id-claim: oid
      # Liste de codes de permission scopés (ex: "tenant:admin#TENANT", "ROLE_OWNER"), pas des
      # rôles Keycloak — voir SecurityContextRepository pour le mapping vers les autorités Spring.
      roles-claim: permissions
