spring:
  # Profils activés via @ActiveProfiles("test", "stub") dans les tests
  # ── R2DBC (tests : H2 in-memory ou PostgreSQL via Testcontainers) ──────────
  r2dbc:
    url: r2dbc:h2:mem:///test_loyalty_db
    username: sa
    password:

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

  # ── Liquibase (désactivé en tests pour favoriser les schémas Testcontainers) ──
  liquibase:
    enabled: false

  # ── Kafka (désactivé en tests unitaires) ────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092

  # ── Redis (désactivé en tests unitaires) ────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  # ── Sécurité (JWT désactivé en tests) ───────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/loyalty-test

app:
  bonification:
    enabled: false

# ── Logs courts en tests ─────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.yowyob.loyaulty: DEBUG
